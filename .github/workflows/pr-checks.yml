  byte-stable-build:
    name: byte-stable-build
    runs-on: ubuntu-latest
    # Activated in Story 4.2 — runs `make clean && make build` twice and
    # asserts dist/ hashes match (NFR21 mechanization).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
