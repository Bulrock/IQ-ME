name: PR Checks

# Murat's fixture-architecture-first applied to CI:
# every future-lint exists as a stub job from end-of-Epic-1. Subsequent epics
# activate a stub by flipping `if: false` → removing the gate; they never add
# a new job. The `# Activates in Epic <N>` comment routes responsibility.

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Epic-1-active lints (run on every PR) ───────────────────────────

  lint-trust-artifacts:
    name: lint-trust-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-trust-artifacts.mjs

  lint-no-role-alert:
    name: lint-no-role-alert
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-role-alert.mjs

  lint-no-share:
    name: lint-no-share
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-share.mjs

  lint-no-cookie-banner:
    name: lint-no-cookie-banner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-cookie-banner.mjs

  lint-no-analytics-script:
    name: lint-no-analytics-script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-analytics-script.mjs

  lint-no-external-font:
    name: lint-no-external-font
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-external-font.mjs

  lint-no-localStorage-without-consent:
    name: lint-no-localStorage-without-consent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-localStorage-without-consent.mjs

  lint-cognitive-load-budget:
    name: lint-cognitive-load-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-cognitive-load-budget.mjs

  # 29th-job exception: eslint is foundational (mechanizes the five-domain
  # boundary model per Story 1.9) and orthogonal to the 28 lint/spec jobs
  # listed in Story 1.6's job set. Any further job additions still go through
  # the "no new jobs after Epic 1" discipline.
  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes eslint@^9.16.0 --max-warnings 0 .

  # ─── Deferred lints (stubbed until responsible epic lands them) ──────

  lint-claims-manifest:
    name: lint-claims-manifest
    runs-on: ubuntu-latest
    # Activated in Story 4.3 (--strict graduation: existing in-repo pages enforce
    # bidirectional assert↔claim coupling; Epic-5 stub pages WARN-only).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-claims-manifest.mjs --strict

  golden-vector-parity:
    name: golden-vector-parity
    runs-on: ubuntu-latest
    # Activated in Epic 2 (Story 2.6b)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Full-set parity (n≥1000)
        run: node --test tests/unit/scoring/irt/parity-full.test.mjs

  network-trace:
    name: network-trace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: npx --yes playwright test tests/playwright/network-trace.spec.mjs

  full-slice-network-trace:
    name: full-slice-network-trace
    runs-on: ubuntu-latest
    # Activates in Epic 3 Story 3.7 — full-slice live spec via tools/dev-server.mjs.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx --yes playwright test tests/playwright/full-slice.spec.mjs

  lint-css-link-order:
    name: lint-css-link-order
    runs-on: ubuntu-latest
    # Activates in Epic 3
    if: false
    steps:
      - run: echo "stub — Activates in Epic 3"

  co-equal-triplet-computed-style:
    name: co-equal-triplet-computed-style
    runs-on: ubuntu-latest
    # Activated in Story 6.1 (Epic 6) — runtime computed-style assertion graduates Story 3.5 CSS-source lint per Murat two-tier defense
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx --yes playwright test tests/playwright/co-equal-triplet-computed-style.spec.mjs

  co-equal-triplet-css-source:
    name: co-equal-triplet-css-source
    runs-on: ubuntu-latest
    # Activates in Epic 3
    if: false
    steps:
      - run: echo "stub — Activates in Epic 3 (Story 3.5)"

  reveal-stage-event-ordering:
    name: reveal-stage-event-ordering
    runs-on: ubuntu-latest
    # Activated in Story 6.1 (Epic 6) — full 6-stage ADR-3-1 sequence event-ordering Playwright spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx --yes playwright test tests/playwright/reveal-stage.spec.mjs

  difficulty-sentence:
    name: difficulty-sentence
    runs-on: ubuntu-latest
    # Activated in Story 6.2 (Epic 6) — FR22 per-item-difficulty breakdown sentence Playwright spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: make build-difficulty-bands
      - run: make build-methodology
      - run: npx --yes playwright test tests/playwright/difficulty-sentence.spec.mjs

  chrome-components:
    name: chrome-components
    runs-on: ubuntu-latest
    # Activated in Story 6.4 (Epic 6) — chrome-header + chrome-footer +
    # theme-toggle visibility matrix + tri-state toggle interactions +
    # localStorage discipline (NFR9) + prefers-color-scheme honor.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: npx --yes playwright test tests/playwright/chrome-components.spec.mjs

  csp-violation-count:
    name: csp-violation-count
    runs-on: ubuntu-latest
    # Activates in Epic 3
    if: false
    steps:
      - run: echo "stub — Activates in Epic 3"

  state-shape-contract:
    name: state-shape-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test tests/contract/state-shape.spec.mjs

  lint-frontmatter:
    name: lint-frontmatter
    runs-on: ubuntu-latest
    # Activated in Story 4.3 — validates YAML frontmatter on every
    # src/content/methodology/**.md page against corpus/schema.json subset.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-frontmatter.mjs

  lint-glossary:
    name: lint-glossary
    runs-on: ubuntu-latest
    # Activated in Story 4.4 — validates `glossaryRefs:` frontmatter structure
    # on every src/content/methodology/**.md page. Per-locale glossary-tree
    # entries are checked when the tree exists; emits deferred WARNs while the
    # tree is absent (Epic 5 will populate).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-glossary.mjs

  lint-reading-level:
    name: lint-reading-level
    runs-on: ubuntu-latest
    # Activated in Story 4.4 (EN only — Flesch-Kincaid grade ≤ 12 per NFR28).
    # Epic 7 extends to RU (Oborneva) + PL (Pisarek/Jasnopis) calibrations;
    # RU/PL pages currently emit a single per-locale deferred WARN.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-reading-level.mjs

  lint-license-provenance:
    name: lint-license-provenance
    runs-on: ubuntu-latest
    # Activated in Story 4.5 — Phase 1 enforces every shipped source file under
    # docs/license-scope-map.md globs traces to a LICENSES.md class; Phase 2
    # enforces NFR24 last-modified-hash discipline (drift requires CHANGELOG.md
    # entry naming LICENSES.md).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-license-provenance.mjs

  byte-stable-build:
    name: byte-stable-build
    runs-on: ubuntu-latest
    # Activated in Story 4.2 — runs `make clean && make build` twice and
    # asserts dist/ hashes match (NFR21 mechanization).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: make test-byte-stable

  lint-fr36-protection:
    name: lint-fr36-protection
    runs-on: ubuntu-latest
    # Activated in Story 5.2 — FR36 protects the "what this instrument does not
    # measure" page from silent shortening or removal. Asserts the page exists
    # with frontmatter protected:true and body length ≥ MIN_CHARS=2000.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-fr36-protection.mjs

  viewport-overflow:
    name: viewport-overflow
    runs-on: ubuntu-latest
    # Activates in Epic 6
    if: false
    steps:
      - run: echo "stub — Activates in Epic 6"

  tear-edge-overlay:
    name: tear-edge-overlay
    runs-on: ubuntu-latest
    # Activated in Story 6.6 (Epic 6) — top-decile tear-edge overlay bbox
    # invariant: the tear-edge SVG box overlaps the caveat and dips past the
    # triplet top at every viewport width 320→1440px (UX-DR25, FR24,
    # UX Innovation #4 — anti-credentialization by composition).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - run: npx --yes playwright test tests/playwright/tear-edge-overlay.spec.mjs

  cropping-fuzzer:
    name: cropping-fuzzer
    runs-on: ubuntu-latest
    # Activated in Story 6.6 (Epic 6) — generates seeded synthetic crops of the
    # rendered top-decile score-panel and asserts no clean score-only crop
    # exists (the caveat/tear-edge survives cropping). The Playwright suite
    # self-gates on corpus/manifest.json bankFrozen (Murat's bank-frozen-flag
    # discipline — dormant while the bank is unfrozen, hard gate once frozen).
    # The unit test pins the pure-geometry verdict logic unconditionally.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test tests/unit/cropping-fuzzer.test.mjs
      - run: npx --yes playwright install --with-deps chromium
      - run: npx --yes playwright test tests/playwright/cropping-fuzzer.spec.mjs

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    # Activated in Story 6.4 — Lighthouse accessibility audit on both
    # themes (NFR12 + UX-DR6 WCAG 2.2 AA contrast in both palettes).
    # Two legs: light + dark, each scored via accessibility category.
    # Threshold ≥ 90 (Lighthouse's WCAG AA contrast checks are part of the
    # accessibility audit).
    strategy:
      fail-fast: false
      matrix:
        theme: [light, dark]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes playwright install --with-deps chromium
      - name: Start dev-server and run Lighthouse (${{ matrix.theme }})
        run: |
          node tools/dev-server.mjs &
          SERVER_PID=$!
          # wait briefly for the server to bind (4173 is the default port).
          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:4173/ > /dev/null 2>&1; then break; fi
            sleep 1
          done
          npx --yes lighthouse@12 \
            http://127.0.0.1:4173/ \
            --only-categories=accessibility \
            --preset=desktop \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu" \
            --emulated-form-factor=desktop \
            --throttling-method=provided \
            --output=json --output-path=./lh-${{ matrix.theme }}.json \
            --quiet \
            --no-enable-error-reporting || true
          # Extract the accessibility score; halt if below 0.9.
          node -e "const r = require('./lh-${{ matrix.theme }}.json'); const s = r.categories.accessibility.score; console.log('accessibility=' + s); if (s < 0.9) { console.error('Lighthouse accessibility score ' + s + ' < 0.90'); process.exit(1); }"
          kill $SERVER_PID || true

  axe-core-pa11y:
    name: axe-core-pa11y
    runs-on: ubuntu-latest
    # Activates in Epic 6
    if: false
    steps:
      - run: echo "stub — Activates in Epic 6"

  lint-translation-parity:
    name: lint-translation-parity
    runs-on: ubuntu-latest
    # Activated in Story 4.7 — no-op stub at Epic 4 close (RU/PL are .gitkeep-only;
    # emits a single WARN line + per-locale summary, exit 0). Epic 7 (Story 7.5b)
    # flips on the full per-locale parity coverage (EN-source-hash diff) once
    # RU/PL content lands.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-translation-parity.mjs

  lint-csp-source:
    name: lint-csp-source
    runs-on: ubuntu-latest
    # Activated in Story 4.8 — out-of-band CSP-source check (NFR7 enforcement
    # contract). Scans src/index.html + post-build dist/methodology/**/*.html
    # for inline <style>/<script>/style=/on*= violations. Architectural
    # exemption: D10 <script nomodule> display-toggle (architecture.md §D10).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make build-methodology
      - run: node tools/lint-csp-source.mjs

  exit-criterion-spec:
    name: exit-criterion-spec
    runs-on: ubuntu-latest
    # Activated in Story 4.8 — Epic-4 exit-criterion verification: every
    # Epic-4-shipped lint demonstrated against both a corpus page AND an SPA-side
    # fragment (Winston Q4 #1/#3 parallelism claim).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make build-methodology
      - run: node --test tests/exit-criteria/epic-04-lint-coverage.spec.mjs
