      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test tests/contract/state-shape.spec.mjs

  lint-frontmatter:
    name: lint-frontmatter
    runs-on: ubuntu-latest
    # Activated in Story 4.3 — validates YAML frontmatter on every
    # src/content/methodology/**.md page against corpus/schema.json subset.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-frontmatter.mjs

  lint-glossary:
    name: lint-glossary
    runs-on: ubuntu-latest
    # Activated in Story 4.4 — validates `glossaryRefs:` frontmatter structure
    # on every src/content/methodology/**.md page. Per-locale glossary-tree
    # entries are checked when the tree exists; emits deferred WARNs while the
    # tree is absent (Epic 5 will populate).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-glossary.mjs

  lint-reading-level:
    name: lint-reading-level
    runs-on: ubuntu-latest
    # Activated in Story 4.4 (EN only — Flesch-Kincaid grade ≤ 12 per NFR28).
    # Epic 7 extends to RU (Oborneva) + PL (Pisarek/Jasnopis) calibrations;
    # RU/PL pages currently emit a single per-locale deferred WARN.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-reading-level.mjs

  lint-license-provenance:
