name: PR Checks

# Murat's fixture-architecture-first applied to CI:
# every future-lint exists as a stub job from end-of-Epic-1. Subsequent epics
# activate a stub by flipping `if: false` → removing the gate; they never add
# a new job. The `# Activates in Epic <N>` comment routes responsibility.

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Epic-1-active lints (run on every PR) ───────────────────────────

  lint-trust-artifacts:
    name: lint-trust-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-trust-artifacts.mjs

  lint-no-role-alert:
    name: lint-no-role-alert
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-role-alert.mjs

  lint-no-share:
    name: lint-no-share
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-share.mjs

  lint-no-cookie-banner:
    name: lint-no-cookie-banner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-cookie-banner.mjs

  lint-no-analytics-script:
    name: lint-no-analytics-script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-analytics-script.mjs

  lint-no-external-font:
    name: lint-no-external-font
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-external-font.mjs

  lint-no-localStorage-without-consent:
    name: lint-no-localStorage-without-consent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-no-localStorage-without-consent.mjs

  lint-i18n-coverage:
    name: lint-i18n-coverage
    runs-on: ubuntu-latest
    # Story 7.1 — every get()/t() key resolves to the EN bundle + no hardcoded
    # prose in textContent (architecture line 838).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-i18n-coverage.mjs

  lint-cognitive-load-budget:
    name: lint-cognitive-load-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-cognitive-load-budget.mjs

  # 29th-job exception: eslint is foundational (mechanizes the five-domain
  # boundary model per Story 1.9) and orthogonal to the 28 lint/spec jobs
  # listed in Story 1.6's job set. Any further job additions still go through
  # the "no new jobs after Epic 1" discipline.
  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes eslint@^9.16.0 --max-warnings 0 .
      - run: make fallow-gates

  # ─── Deferred lints (stubbed until responsible epic lands them) ──────

  lint-claims-manifest:
    name: lint-claims-manifest
    runs-on: ubuntu-latest
    # Activated in Story 4.3 (--strict graduation: existing in-repo pages enforce
    # bidirectional assert↔claim coupling; Epic-5 stub pages WARN-only).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-claims-manifest.mjs --strict

  golden-vector-parity:
    name: golden-vector-parity
    runs-on: ubuntu-latest
    # Activated in Epic 2 (Story 2.6b)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Full-set parity (n≥1000)
        run: node --test tests/unit/scoring/irt/parity-full.test.mjs

  network-trace:
    name: network-trace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/network-trace.spec.mjs

  full-slice-network-trace:
    name: full-slice-network-trace
    runs-on: ubuntu-latest
    # Activates in Epic 3 Story 3.7 — full-slice live spec via tools/dev-server.mjs.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/playwright/full-slice.spec.mjs

  lint-css-link-order:
    name: lint-css-link-order
    runs-on: ubuntu-latest
    # Activated post-Epic-3 — asserts src/index.html keeps the component CSS
    # <link> chain alphabetical (Story 3.4/3.5 convention; cascade-safe).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-css-link-order.mjs

  co-equal-triplet-computed-style:
    name: co-equal-triplet-computed-style
    runs-on: ubuntu-latest
    # Activated in Story 6.1 (Epic 6) — runtime computed-style assertion graduates Story 3.5 CSS-source lint per Murat two-tier defense
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/playwright/co-equal-triplet-computed-style.spec.mjs

  i18n-locale-switch:
    name: i18n-locale-switch
    runs-on: ubuntu-latest
    # Story 7.1 — language-switcher EN/RU/PL end-to-end (DOM, persist+reload,
    # empty-storage first render, active-bundle resolution).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/i18n-locale-switch.spec.mjs

  co-equal-triplet-css-source:
    name: co-equal-triplet-css-source
    runs-on: ubuntu-latest
    # Activated post-Epic-3 — Murat tier-1 CSS-source co-equal lint (Story 3.5
    # AC-6), the source-level pair to the active co-equal-triplet-computed-style.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-css-source-co-equal.mjs

  reveal-stage-event-ordering:
    name: reveal-stage-event-ordering
    runs-on: ubuntu-latest
    # Activated in Story 6.1 (Epic 6) — full 6-stage ADR-3-1 sequence event-ordering Playwright spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/playwright/reveal-stage.spec.mjs

  difficulty-sentence:
    name: difficulty-sentence
    runs-on: ubuntu-latest
    # Activated in Story 6.2 (Epic 6) — FR22 per-item-difficulty breakdown sentence Playwright spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-difficulty-bands
      - run: make build-methodology
      - run: npx playwright test tests/playwright/difficulty-sentence.spec.mjs

  mid-session-bail-out:
    name: mid-session-bail-out
    runs-on: ubuntu-latest
    # Activated in Story 6.3 (Epic 6) — full mid-session bail-out cycle
    # (Escape / Discard / Continue) driven through the SPA, plus the NFR9/FR4
    # privacy invariant: a Storage.prototype.setItem spy asserts ZERO
    # localStorage writes during the bail/discard cycle. SPA-only (landing →
    # consent → item-runner); no methodology/build prerequisite.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/mid-session-bail-out.spec.mjs

  chrome-components:
    name: chrome-components
    runs-on: ubuntu-latest
    # Activated in Story 6.4 (Epic 6) — chrome-header + chrome-footer +
    # theme-toggle visibility matrix + tri-state toggle interactions +
    # localStorage discipline (NFR9) + prefers-color-scheme honor.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/chrome-components.spec.mjs

  csp-violation-count:
    name: csp-violation-count
    runs-on: ubuntu-latest
    # Activated in Story 8.5 (Epic 8) — runs the consolidated trust-verification
    # spec's CSP-violation leg: a page.on('pageerror') + page.on('console')
    # collector asserts ZERO Content-Security-Policy violations across the full
    # SPA happy-path including >=1 methodology corpus page (so build first).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/playwright/trust-verification.spec.mjs

  state-shape-contract:
    name: state-shape-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test tests/contract/state-shape.spec.mjs

  lint-frontmatter:
    name: lint-frontmatter
    runs-on: ubuntu-latest
    # Activated in Story 4.3 — validates YAML frontmatter on every
    # src/content/methodology/**.md page against corpus/schema.json subset.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-frontmatter.mjs

  lint-glossary:
    name: lint-glossary
    runs-on: ubuntu-latest
    # Activated in Story 4.4 — validates `glossaryRefs:` frontmatter structure
    # on every src/content/methodology/**.md page. Per-locale glossary-tree
    # entries are checked when the tree exists; emits deferred WARNs while the
    # tree is absent (Epic 5 will populate).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-glossary.mjs

  lint-reading-level:
    name: lint-reading-level
    runs-on: ubuntu-latest
    # Activated in Story 4.4 (EN Flesch-Kincaid ≤ 12 per NFR28). Story 7.5a
    # added RU (Oborneva) + PL (Pisarek/Jasnopis) calibrations + NFR31 i18n
    # char caps (RU 180 / PL 160) via --include-i18n. Enforcement is gated on
    # translationStatus: in-progress (placeholder) RU/PL content is skipped
    # with a per-locale WARN; it activates when Gate-9c/9d real prose lands.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-reading-level.mjs --include-i18n

  lint-license-provenance:
    name: lint-license-provenance
    runs-on: ubuntu-latest
    # Activated in Story 4.5 — Phase 1 enforces every shipped source file under
    # docs/license-scope-map.md globs traces to a LICENSES.md class; Phase 2
    # enforces NFR24 last-modified-hash discipline (drift requires CHANGELOG.md
    # entry naming LICENSES.md).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-license-provenance.mjs

  byte-stable-build:
    name: byte-stable-build
    runs-on: ubuntu-latest
    # Activated in Story 4.2 — runs `make clean && make build` twice and
    # asserts dist/ hashes match (NFR21 mechanization).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make test-byte-stable

  lint-fr36-protection:
    name: lint-fr36-protection
    runs-on: ubuntu-latest
    # Activated in Story 5.2 — FR36 protects the "what this instrument does not
    # measure" page from silent shortening or removal. Asserts the page exists
    # with frontmatter protected:true and body length ≥ MIN_CHARS=2000.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-fr36-protection.mjs

  viewport-overflow:
    name: viewport-overflow
    runs-on: ubuntu-latest
    # Activated in Story 8.5 (Epic 8) — runs the consolidated trust-verification
    # spec's viewport-overflow leg: iterates widths 320/375/414/768/1024/1280/1440
    # and asserts no horizontal scroll (scrollWidth <= clientWidth) on every
    # rendered surface incl a built methodology page (NFR1).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/playwright/trust-verification.spec.mjs

  asymmetric-tail-scenes:
    name: asymmetric-tail-scenes
    runs-on: ubuntu-latest
    # Activated in Story 6.5 (Epic 6) — asymmetric tail-scene composition
    # (bottom/mid/top decile, silent-companion-line, crisis-resources,
    # reveal-stage gate, zero-third-party). Mirrors the difficulty-sentence
    # driving pattern; the result render fetches the build-generated
    # src/items/item-difficulty-bands.json, so the bands build runs first.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-difficulty-bands
      - run: make build-methodology
      - run: npx playwright test tests/playwright/asymmetric-tail-scenes.spec.mjs

  tear-edge-overlay:
    name: tear-edge-overlay
    runs-on: ubuntu-latest
    # Activated in Story 6.6 (Epic 6) — top-decile tear-edge overlay bbox
    # invariant: the tear-edge SVG box overlaps the caveat and dips past the
    # triplet top at every viewport width 320→1440px (UX-DR25, FR24,
    # UX Innovation #4 — anti-credentialization by composition).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/tear-edge-overlay.spec.mjs

  cropping-fuzzer:
    name: cropping-fuzzer
    runs-on: ubuntu-latest
    # Activated in Story 6.6 (Epic 6) — generates seeded synthetic crops of the
    # rendered top-decile score-panel and asserts no clean score-only crop
    # exists (the caveat/tear-edge survives cropping). The Playwright suite
    # self-gates on corpus/manifest.json bankFrozen (Murat's bank-frozen-flag
    # discipline — dormant while the bank is unfrozen, hard gate once frozen).
    # The unit test pins the pure-geometry verdict logic unconditionally.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test tests/unit/cropping-fuzzer.test.mjs
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/cropping-fuzzer.spec.mjs

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    # Activated in Story 6.4 — Lighthouse accessibility audit on both
    # themes (NFR12 + UX-DR6 WCAG 2.2 AA contrast in both palettes).
    # Two legs: light + dark, each scored via accessibility category.
    # Threshold ≥ 90 (Lighthouse's WCAG AA contrast checks are part of the
    # accessibility audit).
    strategy:
      fail-fast: false
      matrix:
        theme: [light, dark]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - name: Start dev-server and run Lighthouse (${{ matrix.theme }})
        run: |
          node tools/dev-server.mjs &
          SERVER_PID=$!
          # wait briefly for the server to bind (4173 is the default port).
          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:4173/ > /dev/null 2>&1; then break; fi
            sleep 1
          done
          npx --yes lighthouse@12 \
            http://127.0.0.1:4173/ \
            --only-categories=accessibility \
            --preset=desktop \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu" \
            --emulated-form-factor=desktop \
            --throttling-method=provided \
            --output=json --output-path=./lh-${{ matrix.theme }}.json \
            --quiet \
            --no-enable-error-reporting || true
          # Extract the accessibility score; halt if below 0.9.
          node -e "const r = require('./lh-${{ matrix.theme }}.json'); const s = r.categories.accessibility.score; console.log('accessibility=' + s); if (s < 0.9) { console.error('Lighthouse accessibility score ' + s + ' < 0.90'); process.exit(1); }"
          kill $SERVER_PID || true
      # Story 8.5 perf-budget leg (ADDED — the accessibility legs above are
      # preserved). lhci autorun loads tests/perf/lighthouserc.json (mid-tier
      # Android Slow-4G mobile profile) and enforces FCP<1.5s / LCP<2.5s /
      # TTI<3.0s / CLS<0.05 (NFR1). Run once (matrix-independent perf budgets).
      - name: Lighthouse perf budgets (lhci autorun)
        if: matrix.theme == 'light'
        run: npx --yes @lhci/cli@0.14.x autorun --config=tests/perf/lighthouserc.json

  trust-verification-full:
    name: trust-verification-full
    runs-on: ubuntu-latest
    # Story 8.5 (Epic 8) — net-new consolidated full trust-verification suite
    # (FR41). Runs tests/playwright/trust-verification.spec.mjs: network-trace
    # (zero third-party) + CSP-violation count (zero) + viewport-overflow (no
    # horizontal scroll at 320→1440) over the full SPA happy-path including >=1
    # methodology corpus page (so build the corpus first). Per-spec wired
    # (lesson-2026-06-03-001): the spec filename appears explicitly below.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/playwright/trust-verification.spec.mjs

  axe-core-pa11y:
    name: axe-core-pa11y
    runs-on: ubuntu-latest
    # Activated in Story 8.5 (Epic 8) — runs tests/a11y/trust-a11y.spec.mjs:
    # axe-core (via @axe-core/playwright) against every methodology corpus page
    # AND every SPA surface (landing/consent/item-runner/result/tail-scenes),
    # asserting zero contrast/keyboard/landmark/aria violations (WCAG 2.2 AA,
    # NFR12). pa11y is the documented fallback runner (see the spec header).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 @axe-core/playwright@4.11.3 && npx playwright install --with-deps chromium
      - run: make build-methodology
      - run: npx playwright test tests/a11y/trust-a11y.spec.mjs

  lint-translation-parity:
    name: lint-translation-parity
    runs-on: ubuntu-latest
    # Activated in Story 4.7 — no-op stub at Epic 4 close (RU/PL are .gitkeep-only;
    # emits a single WARN line + per-locale summary, exit 0). Epic 7 (Story 7.5b)
    # flips on the full per-locale parity coverage (EN-source-hash diff) once
    # RU/PL content lands.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/lint-translation-parity.mjs

  lint-csp-source:
    name: lint-csp-source
    runs-on: ubuntu-latest
    # Activated in Story 4.8 — out-of-band CSP-source check (NFR7 enforcement
    # contract). Scans src/index.html + post-build dist/methodology/**/*.html
    # for inline <style>/<script>/style=/on*= violations. Architectural
    # exemption: D10 <script nomodule> display-toggle (architecture.md §D10).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make build-methodology
      - run: node tools/lint-csp-source.mjs

  exit-criterion-spec:
    name: exit-criterion-spec
    runs-on: ubuntu-latest
    # Activated in Story 4.8 — Epic-4 exit-criterion verification: every
    # Epic-4-shipped lint demonstrated against both a corpus page AND an SPA-side
    # fragment (Winston Q4 #1/#3 parallelism claim).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make build-methodology
      - run: node --test tests/exit-criteria/epic-04-lint-coverage.spec.mjs

  visual-regression:
    name: visual-regression
    runs-on: ubuntu-latest
    if: false
    # Activates in Epic 14 (Story 14.11). The Aurora rendered visual-regression +
    # contrast + reduced-motion + print/PDF spec
    # (tests/playwright/aurora-visual-regression.spec.mjs) is now AUTHORED and
    # CODE-COMPLETE — every AC leg (per-route/per-viewport/light+dark
    # toHaveScreenshot, ±5% matrix-cell-to-option-icon parity, no-clipping,
    # focus-visible + :checked, reduced-motion stable end-state, print/PDF, and
    # axe-core AA contrast over the gradient). The job is kept DORMANT (`if: false`)
    # because Playwright names snapshots per-platform (`*-linux.png`) and the
    # authoring host is darwin: the committed PNG baselines must be bootstrapped on
    # ubuntu-latest in CI (`make snapshot-update-visual`) before this gate can run
    # green. FINAL ACTIVATION (flip `if: false` -> on; graduate into ci-matrix
    # EPIC_1_ACTIVE; mark the docs row required) is pending that ubuntu-latest
    # baseline bootstrap. Pre-stubbed DORMANT by Story 14.2 (the harness scaffold);
    # this is the ONE documented exception to "no new CI jobs after Epic 1"
    # (epics.md Decision 4) — structural CSS tests provably cannot catch the Epic 13
    # invisible-redesign failure, so rendered pixels are required.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save --no-package-lock @playwright/test@1.60.0 && npx playwright install --with-deps chromium
      - run: npx playwright test tests/playwright/aurora-visual-regression.spec.mjs
