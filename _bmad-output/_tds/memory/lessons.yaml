    lesson: "When a Specialist Self-Review is needed before status flip, the prose must be written into the spec md under the ## Specialist Self-Review heading and committed with the rest of the story changes. Writing to /tmp/self-review-N.md leaves the spec carrying a dangling pointer to an ephemeral file (lost on next reboot or cleanup); the audit trail is broken even though the original review existed. Two epic-4 stories (4-6, 4-7) hit this pattern — auditor caught both as [info]/process-discipline findings. Cost to fix at story-time is one Edit; cost to fix retro-time is reconstructing from memory."
    avoid_pattern: Dev Agent Record references "self-review at /tmp/self-review-4-6.md" without inline section in spec
