    category: process
    tags:
      - retro
      - self-review
      - process
      - bmad
      - aggregation
    summary: Specialist Self-Review 'Areas of uncertainty' sections accumulate retro-relevant items; harvest them deliberately during retro aggregation rather than treating as in-story afterthought
    lesson: "Across epic-1 every story's 'Specialist Self-Review > Areas of uncertainty' surfaced concrete follow-ups (relax test-8 regex to allow re-spelling 'anti-credentialization'; relink ICAR-CONFIRMATION.pdf for dist/ in Epic 4; add lint for dynamic-import boundary; extend spacing scale to --space-12; etc). These are not blocking the current story but ARE the natural input for retros + bridge planning. Retro Step 1 'aggregate' should grep these sections specifically alongside ## Auditor Findings; many useful bridge candidates live ONLY here, never in findings."
    avoid_pattern: "retro aggregation reads only ## Auditor Findings; ignores 'Areas of uncertainty' sections of self-reviews"
    preferred_pattern: "retro aggregation reads: ## Auditor Findings + ## Specialist Self-Review > Areas of uncertainty + ## Completion Notes; cross-reference recurring themes across stories"
    severity: medium
    status: active
    superseded_by: null
