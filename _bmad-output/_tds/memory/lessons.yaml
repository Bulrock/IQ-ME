    lesson: "Story specs use two separate file-list sections: ### File List under ## Dev Agent Record (BMAD-canonical) and a parallel file list inside ## Specialist Self-Review. When the engineer populates only the Self-Review list and leaves the Dev Agent Record File List empty, the spec carries inconsistent signal — automated tooling that reads Dev Agent Record (e.g., future tds story status --file-list extractors) sees nothing, while a human reading the same spec sees the correct list further down. Twice in epic-4 (4-3, 4-8) the section was left empty despite an accurate Self-Review file list. The fix is mechanical (copy-paste before --status=review). Future direction: consolidate to one canonical location."
