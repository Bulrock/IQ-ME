      - git-hook
      - performance
      - bash
      - awk
    summary: Pre-commit hooks must run sub-10ms — bash+awk on canonical-form YAML beats Node/Python fork; graceful exit-0 on schema drift
    lesson: "Pre-commit hooks fire on every commit. Forking a Python interpreter (~150ms cold-start) or Node runtime (~150-300ms on macOS) is unacceptable interactive latency for chore commits. The right tooling is bash+awk on a canonical YAML schema (per ADR-0014: single-line scalars, no flow style); parses sub-10ms with no external runtime dependency. When the schema can drift (multi-line scalars, flow-style entries) the hook should silently exit-0 — graceful degradation (false negative on warning) is preferable to false positive or crash. Same tradeoff applies to commit-msg hooks."
    avoid_pattern: Author the pre-commit hook in Node or Python; or hard-fail on YAML schema variance
    preferred_pattern: bash+awk on the ADR-locked canonical YAML form, with a try/catch-equivalent that exits 0 on parser surprise
    severity: low
    status: active
    superseded_by: null
