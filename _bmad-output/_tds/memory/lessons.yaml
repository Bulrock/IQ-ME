    summary: Stories that delete a previous storys class-A artefact must include an explicit integrity-cleanup task in Acceptance Criteria; implicit deletion leaves a phantom integrity entry
    lesson: 'Story-3-1 authored `tests/scaffold/story-3-1-marker.test.mjs` as a defense-in-depth state-machine marker (class-A integrity-recorded). Story-3-2 Task 5.1 deleted that marker as part of its scope, but the AC list named only the deletion of the file — not the integrity-registry cleanup. The auditor surfaced this as a round-1 blocker (no `tds integrity remove` CLI exists, so the cleanup is manual YAML editing). Lesson: when authoring a story spec whose scope deletes a class-A artefact recorded under a previous story, the AC list MUST include a paired "remove the integrity entry for <path>" task with explicit role attribution (engineer, since deletion is code-write side). Otherwise the deletion ships green on its own tests but `tds deliver`s pre-merge integrity-verify gate refuses the epic squash.'
    avoid_pattern: Story spec lists "delete tests/scaffold/<previous-story-marker>.test.mjs as part of Task 5" without paired integrity-cleanup task; auditor catches the phantom integrity entry at code-review time
    preferred_pattern: "Story spec AC checklist contains: `[ ] AC-N: Delete tests/scaffold/<path> (engineer)` + `[ ] AC-N+1: Remove integrity entry for tests/scaffold/<path> from state-manifest.yaml; tds integrity verify --as=auditor returns failed=<expected-N> (engineer)`. Both ride into the same state-commit sweep"
    severity: medium
    status: active
