    summary: Two consecutive byte-budget near-misses within one epic signal that the budget needs re-evaluation OR that a shared utility should be extracted, not that the next story should also "squeeze it in"
    lesson: 'Epic-3 brushed the `app-modules-bytes` 30720 budget twice: story-3-5 closed at 30715/30720 (5 bytes headroom); story-3-7 reclaimed 97 bytes via main.js comment-collapse + test-hook.js exclude. The 3-5 self-review §uncertainty #1 flagged a candidate shared `_html-escape.js` util duplicated across 5+ modules. Pattern: a budget that requires comment-stripping and exclusion tweaks to fit is no longer a clean cognitive-load signal — it is a refactor signal. Verifiable: track byte-budget delta as an SLI in retro alongside test count + lint count; two consecutive stories within Δ < 1% of cap trigger a "refactor or revise" decision in retro, not a "next story also squeezes" assumption.'
    avoid_pattern: Story-N closes 5 bytes under cap; specialist self-review notes "shared util would help"; next story has to find clever comment-strip tricks to fit; pattern repeats next epic
    preferred_pattern: 'When stories within Δ < 1% of a byte/perf budget for 2+ consecutive ships, retro emits a Bridge Plan item: "refactor shared util OR revise the budget" before proceeding to next epic. Track headroom (bytes-free / budget) as an SLI per retro'
    severity: low
    status: active
    superseded_by: null
