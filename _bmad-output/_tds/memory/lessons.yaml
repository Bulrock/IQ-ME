  - id: lesson-2026-05-20-003
    created_during: epic-4
    created_at: 2026-05-20T08:54:22.310Z
    created_by: auditor
    story_refs:
      - 4-7-stale-translation-hatnote-component-lint-translation-parity-no-op-stub
    category: technical
    tags:
      - architecture
      - forward-design
      - i18n
      - stable-contract
      - bmad
    summary: Forward-design infrastructure stubs with stable contracts preserve cross-epic stability — plant the affordance now, content lights up later
    lesson: 'Story 4-7 shipped multi-locale walk (LOCALES = [en, ru, pl]), EN-source-hash hook, stale-translation hatnote component, and lint-translation-parity stub — all at Epic-4 close — while RU/PL trees remain .gitkeep-only until Epic-7. The contract (body-only SHA-256, parity gate logic, lint exit codes, hatnote CSS data-attribute) is frozen now and Epic-7 only flips on the content. This is the counter-pattern to the Epic-2 anti-pattern (lesson-2026-05-19-010 — mid-implementation identifier transformation creating decision-debt). Cost: one round of stub design + WARN-mode no-op lint = ~1 day. Payoff: zero rename churn at content-arrival, zero re-litigation of the parity algorithm, zero "what was the Epic-4 hatnote DOM shape" archaeology. Validates as a deliberate pattern: when an epic will revisit a surface in N epics, plant the structurally-complete stub with the production contract NOW and gate it on content presence.'
    avoid_pattern: Ship only EN code paths; defer multi-locale loop, hash hook, and parity lint to Epic-7 → renames + DOM shape changes ripple across all EN snapshots, lint contract relitigated
    preferred_pattern: Ship the iteration loop, the contract-bearing helpers, and a WARN-mode lint stub in the foundation epic; gate behavior on data presence (e.g., RU/PL .gitkeep-only) so EN paths are unaffected until content lands
    severity: medium
    status: active
    superseded_by: null
