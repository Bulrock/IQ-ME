  - id: lesson-2026-05-19-005
    created_at: 2026-05-19T13:22:12.612Z
    created_by: writer
    story_refs: []
    category: process
    tags:
      - auditor
      - review-loop
      - convergence
      - retro
      - bridge
    summary: Auditor review-loop on info-only findings should converge after round 1; re-emit identical findings 8× rounds (4 unique × 2 replays) signals missing 'approved-with-deferred' exit
    lesson: "Bridge-1-2 went through 8 auditor rounds; rounds 5-8 were byte-identical replays of rounds 1-4. All findings severity=info, none blocked merge. Pattern indicates auditor lacked a 'approved-with-deferred-findings' verdict path and kept re-emitting. When all unique findings are info-level and acknowledged, the next verdict should be 'approved-with-deferred' (envelope already supports it per bmad-tds-auditor SKILL.md), not another review round. Verifiable: count distinct vs total auditor findings per story spec; ratio > 1.5x signals review-loop non-convergence."
    avoid_pattern: re-emit identical auditor findings round after round when severity=info and impl is shipped; verdict stays 'changes-requested' across multiple rounds without any new findings
    preferred_pattern: after round 1 of all-info findings + specialist ack, auditor returns verdict='approved-with-deferred' with findings array unchanged; orchestrator merges with deferred-findings list attached to PR body
    severity: medium
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-006
    created_at: 2026-05-19T13:22:24.873Z
    created_by: writer
    story_refs: []
    category: process
    tags:
      - bridge
      - cross-repo
      - bundle
      - upstream
      - scope
    summary: Cross-repo CLI bridges (upstream impl + downstream bundle install) must scope 'upstream commit + release + downstream re-pin' explicitly, or downstream regresses on next bmad install
    lesson: "Bridge-1-2-1 implemented unfreeze-tests in upstream bmad-tds-module (TypeScript) and installed the rebuilt bundle in IQ-ME (story branch). Bridge spec did not include upstream commit/push/release/re-pin as in-scope acceptance criteria. Result: upstream tree carries 8 uncommitted modifications + 2 untracked files; next 'bmad install' against upstream main would overwrite the IQ-ME bundle with an older version missing the feature, silently regressing. Verifiable: any bridge spec touching  MUST contain either (a) AC pinning upstream commit SHA + module version pin in , or (b) explicit follow-up bridge ticket for upstream commit + release + downstream re-pin."
    avoid_pattern: bridge spec lists only downstream bundle drop; upstream commit + release + re-pin treated as 'out of scope, user handles separately'
    preferred_pattern: bridge spec covering bundle-distributed CLI ships AC 'upstream commit SHA <sha> tagged as <version>; manifest.yaml pinned to <version>'; OR splits into bridge-Nx + bridge-Nx+1 with explicit dependency
    severity: medium
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-007
    created_during: bridge-1-2
    created_at: 2026-05-19T13:22:51.140Z
    created_by: writer
    story_refs:
      - bridge-1-2-1-add-tds-story-unfreeze
    category: tooling
    tags:
      - integrity
      - retro
      - preflight
      - drift
      - ratification
    summary: Retro that edits story specs post-epic-merge silently drifts tds integrity; future preflight gates trip until ratified — retro should self-verify before sprint-status flip
    lesson: "Epic-1 retrospective post-edited stories/1-6 and stories/1-7 specs after their integrity was recorded; bridge-1-2 auditor round-4 confirmed 'failed=2' on those paths. Drift is non-blocking for the touching retro but trips preflight check on the very NEXT story's PR create or epic-execute. Verifiable: retro orchestrator (workflow step 5/6) should call 'tds integrity verify' before final state-commit; on failed=N>0 prompt user 'ratify retro post-edits as: tds integrity record --as=engineer --story=<retro-key> --files=... --notes=\"retro post-edit ratification\"' or document explicit defer. Generic across all retro scopes."
    avoid_pattern: retro edits story specs (to add lessons cross-link, fix typo, etc.) without re-ratifying integrity; auditor in next-cycle preflight discovers the drift
    preferred_pattern: retro Step 5/6 includes 'tds integrity verify' check; if failed>0 then prompt for ratification via 'tds integrity record --as=engineer --story=<retro-key> --files=...' before final sweep
    severity: low
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-008
    created_at: 2026-05-19T13:46:45.207Z
    created_by: writer
    story_refs:
      - bridge-1-2-1-add-tds-story-unfreeze
    category: process
    tags:
      - bridge
      - upstream
      - bmad-tds-module
      - deferred
      - b1
    summary: bridge-1-2-1 unfreeze-tests is a SUPERSET of upstream TI-2 unfreeze-tests (c91ccb6); local bmad-tds-module commit 194bc31 deferred — needs separate clean PR onto origin/main
    lesson: "2026-05-19: attempted to commit + push + tag bridge-1-2-1's unfreeze-tests CLI to upstream bmad-tds-module per epic-1 retro. Found: (1) local bmad-tds-module working tree was 30+ commits BEHIND origin/main (which had advanced to v6.6.15 since IQ-ME's last sync); (2) upstream main already shipped a SIMPLER unfreeze-tests via TI-2 (commit c91ccb6, kind='unfreeze-tests' event, no --files, no per-file window, no forward-transition blocker, no integrity close-action); (3) bridge-1-2-1 is strictly the superset (adds --files, per-file windows, forward-blocker, close-action, kind='unfreeze' new event preserving v1 back-compat). Local commit 194bc31 landed on local bmad-tds-module main but cannot fast-forward push because of TI-2 + 29 other intermediate commits touching state.ts/integrity.ts/story.ts/shared.ts. Authoring the upstream PR properly = additive feature on top of TI-2 (open-windows table + forward-blocker + close-action as a tier-2 affordance layered onto existing kind='unfreeze-tests'). IQ-ME continues running the locally-built superset bundle (shipped 2026-05-19 via PR #2/036f1e5); no urgency to roll back. Whenever the upstream PR lands, IQ-ME re-installs and bundles re-anchor to a real released version."
    avoid_pattern: rebase 1 dirty commit onto 30 upstream commits with overlapping file touches; assume your locally-built bundle is the upstream-current implementation
    preferred_pattern: check origin/main divergence BEFORE bundle-building local TDS work for downstream install; if upstream already shipped a related feature, author the enhancement as an additive PR off origin/main HEAD, not a divergent fork
    severity: medium
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-009
    created_during: epic-2
    created_at: 2026-05-19T16:37:21.908Z
    created_by: writer
    story_refs:
      - 2-6a-r-in-ci-harness-smoke-golden-vector-set-n-10
      - 2-6b-full-1-000-pattern-golden-vector-set-ci-parity-wiring
    category: process
    tags:
      - deferred-validation
      - ci
      - external-runtime
      - hotfix-pattern
    summary: Deferred-validation gates requiring external runtime (R, Docker, mobile-CI) routinely surface post-merge as hotfix PRs because the workflow can't be exercised locally
    lesson: "Epic-2 R-mirt golden-regen workflow was hand-validated against mirt docs but the initial-parameter-template fit path wasn't exercised locally (no R). First post-merge dispatch failed at the DoF error for nItems=1 entries; hotfix PR #5 (commit 4b0f51c) replaced mirt() with mirt(..., pars='values'). Same pattern recurred from epic-1 (CI matrix activation paths). Verifiable: any story with 'Areas of uncertainty' mentioning 'first CI dispatch outcome' or 'first dispatch will validate end-to-end' predicts a follow-up hotfix PR within 1-3 days of merge. Mitigation: spec a 'dry-run docker container' or 'workflow_dispatch from feature branch BEFORE story close' AC when the external runtime is required for the validation path."
    avoid_pattern: Hand-validate workflow YAML + external-runtime script against docs only; defer first dispatch to post-merge with 'will validate end-to-end' phrasing in self-review
    preferred_pattern: Either (a) install runtime locally for one validation run before story close; (b) spec a 'workflow_dispatch from feature branch' AC that triggers the workflow against an unmerged ref; (c) explicitly time-box a 'first-dispatch hotfix' bridge in the next epic's backlog with the suspected failure modes pre-enumerated
    severity: medium
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-010
    created_during: epic-2
    created_at: 2026-05-19T16:37:36.986Z
    created_by: writer
    story_refs:
      - 2-7-populate-methodology_claims-json-activate-lint-claims-manifest
    category: tooling
    tags:
      - schema
      - claim-id
      - epic-narrative
      - prevalidation
      - identifiers
    summary: Epic-narrative authoring proposes identifiers (claim-id, page-slug, etc.) without pre-validating against frozen schema regex; specialists then transform mid-implementation, creating decision-debt for future authors
    lesson: "Story 2-7 spec inherited epic-narrative claim-id 'golden-vector-parity-0.001-logits' from epic-2 doc; the frozen METHODOLOGY_CLAIMS schema regex '^[a-z][a-z0-9-]*$' (Story 1.4 deliverable, class-A) forbids dots. Specialist transformed to 'golden-vector-parity-0001-logits' (numerical-digit form) and documented the deviation in self-review. Future Epic 5 methodology page asserts must use the digit-string form, but the epic-narrative still reads the decimal-dot form — naming drift between docs. Verifiable: grep epic-narrative drafts (epics.md, story specs) for proposed identifiers; run each against the relevant frozen schema patterns BEFORE story-creation handoff. Similar regex-vs-prose collisions hit epic-1 (lesson-2026-05-19-002 — frozen-test regexes forced unnatural prose workarounds)."
    avoid_pattern: "Epic-narrative author writes 'claim-id: foo-0.001-logits' (decimal-dot) without checking schema regex; specialist discovers mismatch during impl and silently transforms; epic-narrative continues to read the original form, creating documentation drift"
    preferred_pattern: "Pre-story handoff step: grep epic-narrative and story spec for all proposed identifiers (claim-ids, slugs, keys); validate each against frozen schema regex; fix in spec BEFORE specialist starts. Optional: lint script tools/lint-spec-identifiers.mjs runs in pre-create-story hook"
    severity: medium
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-011
    created_during: epic-2
    created_at: 2026-05-19T16:37:49.869Z
    created_by: writer
    story_refs:
      - 2-5-public-api-in-src-scoring-irt-index-js-scoresession-facade
      - 2-6a-r-in-ci-harness-smoke-golden-vector-set-n-10
      - 2-6b-full-1-000-pattern-golden-vector-set-ci-parity-wiring
    category: process
    tags:
      - self-circular
      - parity
      - fixture
      - audit-gate
      - provenance
      - changelog
    summary: "'Self-circular by construction' parity (test asserts X against expected X generated by the same impl) is a legitimate intermediate state, but the in-repo posture must carry an explicit provenance trail or future readers see audited where the gate is deferred"
    lesson: "Epic-2 had a ~24h window where vectors-smoke.json, vectors.json, and the parity tests all asserted JS-engine output against JS-engine-generated 'expected' values. Auditor caught all three stories with [info] deferred-validation findings; stories 2-5/2-6a/2-6b each independently disclosed the self-circularity. The two-file design (vectors-smoke.json as SUT, r-output-smoke.json as audit signal) plus CHANGELOG v0.1 → v0.2 → v1.0 → v2.0 → v2.1 entries preserved the audit trail and resolved cleanly post-merge with bit-perfect R-mirt MATCH. Verifiable: any test asserting actual ≈ expected where expected was generated by actual's implementation must carry (a) an explicit 'self-circular until <gate>' header comment in the test file, AND (b) a CHANGELOG entry naming the deferred validator + outcome placeholder. grep tests/ for 'expected.*generated by' or 'fixture regen' should always have a matching CHANGELOG entry."
    avoid_pattern: Regenerate fixture against the SUT impl to unblock impl work; commit test + fixture as 'parity passes' without a provenance line; rely on auditor catching it
    preferred_pattern: When regenerating a fixture against the SUT (legitimate when third-party validator is in a later story), commit with (1) test-file header comment naming the audit-gate story, (2) CHANGELOG entry with placeholder for measured drift, (3) explicit self-review section flagging the deferred-validation state for auditor visibility
    severity: low
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-012
    created_during: epic-2
    created_at: 2026-05-19T16:38:02.254Z
    created_by: writer
    story_refs:
      - 2-1-scaffold-src-scoring-irt-module-write-red-phase-parity-test
      - 2-2-implement-quadrature-js-likelihood-js-pure-math-primitives
      - 2-4-implement-se-js-standard-error-from-posterior-variance
      - 2-5-public-api-in-src-scoring-irt-index-js-scoresession-facade
      - 2-7-populate-methodology_claims-json-activate-lint-claims-manifest
    category: process
    tags:
      - architecture
      - d3
      - canonical-names
      - aliases
      - api-design
    summary: Architecture D3 canonical names win over epic-narrative descriptive names in cross-domain interfaces; epic-narrative names ship as zero-cost re-export aliases (not duplicate impls)
    lesson: "Epic-2 chose D3-canonical names (quadraturePoints, logLikelihood, eapEstimate, standardError, scoreSession({...})) over epic-narrative descriptive names (gridPoints, patternLogLikelihood, estimateTheta, posteriorSE, scoreSession(positional)) in 5 of 8 stories. Rationale recurred: D3 is the contract that Epic 3 (state.schema.json), Epic 5 (METHODOLOGY_CLAIMS.method), and the SPA result page consume; epic-narrative is descriptive scaffolding for readers. Aliases shipped via 'export { X as epicName }' or single-line positional shims — zero math duplication. Verifiable: any spec proposing both D3 + epic-narrative names should pin the alias decision (or the explicit divergence) upfront in story Dev Notes, not relitigate per impl. Pattern memo for Epic 3+: when D3 and epic-narrative collide, D3 is normative; alias the other."
    avoid_pattern: Specialist relitigates 'should I use D3 name or epic-narrative name?' per story; each story makes the same call independently; risk of one specialist diverging
    preferred_pattern: "Story spec Dev Notes section names both forms upfront with explicit 'D3 canonical; epic-narrative shipped as zero-cost alias' decision. For future epic-spec authoring: when both names exist, the spec template prepopulates the D3-canonical-wins choice unless the author opts out with rationale"
    severity: low
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-013
    created_during: epic-3
    created_at: 2026-05-19T23:17:49.077Z
    created_by: writer
    story_refs:
      - 3-2-implement-state-js-contract-test
    category: process
    tags:
      - tds-cli
      - integrity
      - state-sweep
      - sweep-resurrection
    summary: Direct YAML edits to state-manifest.yaml can be silently undone by next tds state-commit sweep re-recording the path
    lesson: "Story-3-2 round-1 resolution removed a stale integrity entry for `tests/scaffold/story-3-1-marker.test.mjs` via direct YAML edit (no `tds integrity remove` CLI exists). The auditor resolution note declared the removal complete, but the entry is back in `state-manifest.yaml` at epic-3 close (recorded_at 2026-05-19T17:16:25Z — after the round-1 fix). Hypothesis: a later `tds state-commit` sweep treated the on-disk-but-deleted-file as a dirty TDS-managed path and re-recorded it. Lesson: any direct manual edit to `_tds/state-manifest.yaml` must be verified after the next sweep — read the YAML back and confirm the intended row is still absent. If the row is resurrected, the deletion path is fighting the sweep heuristic and a real CLI affordance is needed (see bridge B1)."
    avoid_pattern: Edit state-manifest.yaml directly to remove a stale integrity entry, write "Resolved" in the spec, move on without re-verifying after the next state-commit sweep
    preferred_pattern: "After direct state-manifest.yaml edit: (1) run `tds state-commit` for the surrounding work, (2) re-grep `state-manifest.yaml` for the removed path, (3) if the path resurrected, escalate to a `tds integrity remove` bridge story rather than fighting the sweep"
    severity: high
    status: active
    superseded_by: null
  - id: lesson-2026-05-19-014
    created_during: epic-3
    created_at: 2026-05-19T23:18:02.300Z
    created_by: writer
    story_refs:
      - 3-6-author-3-en-methodology-stub-pages-the-click-targets
    category: technical
    tags:
      - node-test
      - parallel
      - flake
      - filesystem-fixture
      - dist
    summary: Tests sharing a filesystem fixture path (dist/) race under default node:test parallelism; per-test mkdtempSync + env-var output override eliminates the flake
    lesson: 'Story-3-6 round-1 blocker: `tests/scaffold/build-methodology-output.test.mjs` and `tests/unit/dev-server.test.mjs` both touched repo-root `dist/`; the build-methodology test unconditionally `rmSync`d `dist/` in setup AND `finally`. Under default node:test file-parallelism (workers ≈ CPU count) this raced ~75% of `make test` runs. Fix: per-test temp dir via `mkdtempSync(join(tmpdir(), "iqme-build-meth-"))` + env-var output override (`IQME_BUILD_METHODOLOGY_OUT`) consumed by the build tool. The complementary consumer test (`dev-server.test.mjs`) was already read-only with a `t.skip()` guard, which is the correct counterpart pattern. Generalizable: any test that writes to a sibling-test artefact must use a per-invocation temp path; no test ever `rmSync`s a shared fixture directory.'
    avoid_pattern: 'Hardcode `const DIST = join(repoRoot, "dist")` in setup + finally with `rmSync({ recursive: true, force: true })`; assume "make test runs serially in practice"'
    preferred_pattern: '`const DIST = mkdtempSync(join(tmpdir(), "feature-name-"))` in setup; pass via env var (`FEATURE_OUTPUT_DIR=$DIST`) to the SUT; cleanup `rmSync(DIST)` only on the per-test path. Read-side tests: `t.skip()` if shared fixture absent, never write to it'
    severity: medium
    status: active
    superseded_by: null
