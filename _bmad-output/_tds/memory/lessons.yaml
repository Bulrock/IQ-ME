    summary: "tds deliver Mode 2 can partial-finalize: epic→done, stories left at approved, no main switch. Verify before re-running."
    lesson: "After /bmad-tds-code-review --epic=<id> auto-deliver completes, verify on origin/main that ALL story keys AND the epic key show 'done' in sprint-status.yaml. If any story is still at 'approved', DO NOT re-run tds deliver — it does not always detect the merged PR and may open a phantom second PR. Use manual recovery: flip stories via sprint_status_writer.py, hard-reset local main to origin/main (squash may have replaced SHAs), commit finalization on main, delete epic branch."
    avoid_pattern: blindly re-running 'tds deliver' after OH-07 partial finalize
    preferred_pattern: "post-deliver verify: grep -A3 '^  <epic-id>:' sprint-status.yaml | grep -q done; if any story at approved → manual recovery"
