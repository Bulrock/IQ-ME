    lesson: "When a story needs CLI/bundle changes in sibling-repo (bmad-tds-module) before its formal npm release, split tasks: implement + test in sibling-repo on its own feature branch; consume in IQ-ME via temporary bundle bump on the epic branch. Commit message MUST mark the bundle bump as temporary and reference the source branch — next formal release supersedes naturally. Story-Id trailer keeps audit trail."
