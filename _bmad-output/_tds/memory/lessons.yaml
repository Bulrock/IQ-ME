    summary: tds CLI requires Python ≥3.10 + ruamel.yaml; prefix PATH=/opt/homebrew/bin:$PATH on macOS where /usr/bin/python3 is 3.9
    avoid_pattern: "_bmad/tds/bin/tds <subcommand> # picks up system python3 3.9, ModuleNotFoundError: ruamel"
    preferred_pattern: PATH=/opt/homebrew/bin:$PATH _bmad/tds/bin/tds <subcommand>
    severity: high
    status: active
    superseded_by: null
